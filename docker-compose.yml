x-app-env: &app-env
  PYTHONPATH: /app
  APP_ENV: ${APP_ENV:-development}
  RUN_ENV: ${RUN_ENV:-local}
  DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/spotify_curator.sqlite}
  SQLITE_PATH: ${SQLITE_PATH:-}
  TEMP_AUDIO_DIR: ${TEMP_AUDIO_DIR:-}
  SQLITE_JOURNAL_MODE: ${SQLITE_JOURNAL_MODE:-WAL}
  CACHE_DIR: ${CACHE_DIR:-/app/cache}
  MODELS_DIR: ${MODELS_DIR:-/app/models}
  LOGS_DIR: ${LOGS_DIR:-/app/logs}
  EXPORT_DIR: ${EXPORT_DIR:-/app/exports}
  JOB_DEFAULT_MAX_ATTEMPTS: ${JOB_DEFAULT_MAX_ATTEMPTS:-3}
  JOB_WORKER_HEARTBEAT_INTERVAL_SECONDS: ${JOB_WORKER_HEARTBEAT_INTERVAL_SECONDS:-10}
  JOB_ITEM_LOCK_TIMEOUT_SECONDS: ${JOB_ITEM_LOCK_TIMEOUT_SECONDS:-600}
  JOB_EVENTS_ENABLED: ${JOB_EVENTS_ENABLED:-true}
  WORKER_HEARTBEATS_ENABLED: ${WORKER_HEARTBEATS_ENABLED:-true}
  AUDIO_SEGMENT_MAX_SECONDS: ${AUDIO_SEGMENT_MAX_SECONDS:-30}
  AUDIO_SEGMENT_DEFAULT_SECONDS: ${AUDIO_SEGMENT_DEFAULT_SECONDS:-15}
  AUDIO_KEEP_SEGMENTS_AFTER_ANALYSIS: ${AUDIO_KEEP_SEGMENTS_AFTER_ANALYSIS:-false}
  AUDIO_DEBUG_KEEP_FAILED_SEGMENTS: ${AUDIO_DEBUG_KEEP_FAILED_SEGMENTS:-false}
  AUDIO_SEGMENT_STRATEGY: ${AUDIO_SEGMENT_STRATEGY:-hybrid_deezer_youtube_representative}
  AUDIO_DOWNLOAD_CONCURRENCY: ${AUDIO_DOWNLOAD_CONCURRENCY:-2}
  AUDIO_DOWNLOAD_MAX_RETRIES: ${AUDIO_DOWNLOAD_MAX_RETRIES:-3}
  AUDIO_DOWNLOAD_BATCH_SIZE: ${AUDIO_DOWNLOAD_BATCH_SIZE:-20}
  AUDIO_DOWNLOAD_ITEM_LOCK_TIMEOUT_SECONDS: ${AUDIO_DOWNLOAD_ITEM_LOCK_TIMEOUT_SECONDS:-600}
  DEEZER_API_BASE_URL: ${DEEZER_API_BASE_URL:-https://api.deezer.com}
  DEEZER_TIMEOUT_SECONDS: ${DEEZER_TIMEOUT_SECONDS:-15}
  DEEZER_MAX_RETRIES: ${DEEZER_MAX_RETRIES:-3}
  DEEZER_PREVIEW_UI_MIN_CONFIDENCE: ${DEEZER_PREVIEW_UI_MIN_CONFIDENCE:-0.60}
  DEEZER_PREVIEW_ANALYSIS_MIN_CONFIDENCE: ${DEEZER_PREVIEW_ANALYSIS_MIN_CONFIDENCE:-0.60}
  YOUTUBE_MIN_CONFIDENCE: ${YOUTUBE_MIN_CONFIDENCE:-0.50}
  AUDIO_PREVIEW_CACHE_METADATA_DAYS: ${AUDIO_PREVIEW_CACHE_METADATA_DAYS:-7}
  AUDIO_PREVIEWS_ENABLED: ${AUDIO_PREVIEWS_ENABLED:-true}
  CONFIDENCE_WEIGHT_YOUTUBE_REPRESENTATIVE: ${CONFIDENCE_WEIGHT_YOUTUBE_REPRESENTATIVE:-0.95}
  CONFIDENCE_WEIGHT_YOUTUBE_FALLBACK_THREE: ${CONFIDENCE_WEIGHT_YOUTUBE_FALLBACK_THREE:-1.00}
  CONFIDENCE_WEIGHT_DEEZER_PREVIEW_ONLY: ${CONFIDENCE_WEIGHT_DEEZER_PREVIEW_ONLY:-0.70}
  YTDLP_FORMAT: ${YTDLP_FORMAT:-bestaudio/best}
  YTDLP_TIMEOUT_SECONDS: ${YTDLP_TIMEOUT_SECONDS:-120}
  FFMPEG_TIMEOUT_SECONDS: ${FFMPEG_TIMEOUT_SECONDS:-120}
  YTDLP_DURATION_TOLERANCE_SECONDS: ${YTDLP_DURATION_TOLERANCE_SECONDS:-15}
  ESSENTIA_LOWLEVEL_PROFILE: ${ESSENTIA_LOWLEVEL_PROFILE:-/app/profiles/essentia_lowlevel_full.yaml}
  ESSENTIA_LOWLEVEL_PIPELINE_VERSION: ${ESSENTIA_LOWLEVEL_PIPELINE_VERSION:-essentia_lowlevel_v2_full}
  ESSENTIA_LOWLEVEL_MAX_RETRIES: ${ESSENTIA_LOWLEVEL_MAX_RETRIES:-2}
  ESSENTIA_LOWLEVEL_ITEM_MODE: ${ESSENTIA_LOWLEVEL_ITEM_MODE:-track}
  ESSENTIA_LOWLEVEL_ITEM_LOCK_TIMEOUT_SECONDS: ${ESSENTIA_LOWLEVEL_ITEM_LOCK_TIMEOUT_SECONDS:-900}
  ESSENTIA_LOWLEVEL_TIMEOUT_SECONDS: ${ESSENTIA_LOWLEVEL_TIMEOUT_SECONDS:-180}
  ANALYSIS_PIPELINE_MODE: ${ANALYSIS_PIPELINE_MODE:-streaming}
  AUDIO_ANALYSIS_PIPELINE_VERSION: ${AUDIO_ANALYSIS_PIPELINE_VERSION:-audio_pipeline_v1}
  ANALYSIS_ADVANCED_ENABLED: ${ANALYSIS_ADVANCED_ENABLED:-true}
  ANALYSIS_DEFAULT_INCLUDE_TENSORFLOW: ${ANALYSIS_DEFAULT_INCLUDE_TENSORFLOW:-true}
  ANALYSIS_PIPELINE_TICK_ENABLED: ${ANALYSIS_PIPELINE_TICK_ENABLED:-true}
  ANALYSIS_PIPELINE_TICK_INTERVAL_SECONDS: ${ANALYSIS_PIPELINE_TICK_INTERVAL_SECONDS:-45}
  AUDIO_CLEANUP_WAIT_FOR_ALL_CONSUMERS: ${AUDIO_CLEANUP_WAIT_FOR_ALL_CONSUMERS:-true}
  ESSENTIA_TENSORFLOW_PIPELINE_VERSION: ${ESSENTIA_TENSORFLOW_PIPELINE_VERSION:-essentia_tensorflow_v1}
  ESSENTIA_TF_PIPELINE_VERSION: ${ESSENTIA_TF_PIPELINE_VERSION:-phase6_tf_unified_v1}
  ESSENTIA_TENSORFLOW_BATCH_SIZE: ${ESSENTIA_TENSORFLOW_BATCH_SIZE:-1}
  ESSENTIA_TF_BATCH_SIZE: ${ESSENTIA_TF_BATCH_SIZE:-1}
  ESSENTIA_TF_BATCH_TIMEOUT_MS: ${ESSENTIA_TF_BATCH_TIMEOUT_MS:-1000}
  ESSENTIA_TF_WARMUP: ${ESSENTIA_TF_WARMUP:-false}
  ESSENTIA_TF_DEVICE: ${ESSENTIA_TF_DEVICE:-auto}
  ESSENTIA_MODEL_PROFILE: ${ESSENTIA_MODEL_PROFILE:-}
  ESSENTIA_TENSORFLOW_MAX_RETRIES: ${ESSENTIA_TENSORFLOW_MAX_RETRIES:-1}
  ESSENTIA_TENSORFLOW_ITEM_LOCK_TIMEOUT_SECONDS: ${ESSENTIA_TENSORFLOW_ITEM_LOCK_TIMEOUT_SECONDS:-600}
  ESSENTIA_TENSORFLOW_STATUS_ONLY: ${ESSENTIA_TENSORFLOW_STATUS_ONLY:-false}
  ESSENTIA_TF_REAL_INFERENCE_ENABLED: ${ESSENTIA_TF_REAL_INFERENCE_ENABLED:-true}
  ESSENTIA_TF_ALLOW_STUBS_IN_TESTS: ${ESSENTIA_TF_ALLOW_STUBS_IN_TESTS:-false}
  ESSENTIA_TF_REQUIRE_MODELS_FOR_ADVANCED: ${ESSENTIA_TF_REQUIRE_MODELS_FOR_ADVANCED:-false}
  ESSENTIA_TF_FAIL_ON_STUB_IN_PRODUCTION: ${ESSENTIA_TF_FAIL_ON_STUB_IN_PRODUCTION:-true}
  ADVANCED_FEATURES_TOP_K_GENRES: ${ADVANCED_FEATURES_TOP_K_GENRES:-10}
  ENERGY_PROXY_ENABLED: ${ENERGY_PROXY_ENABLED:-true}
  ESSENTIA_MODELS_DIR: ${ESSENTIA_MODELS_DIR:-/app/models/essentia}
  ESSENTIA_MODELS_MANIFEST: ${ESSENTIA_MODELS_MANIFEST:-/app/core/app/models_registry/essentia_models_manifest.yaml}
  ESSENTIA_MODELS_DEFAULT_PROFILE: ${ESSENTIA_MODELS_DEFAULT_PROFILE:-phase6-recommended}
  ESSENTIA_MODELS_DOWNLOAD_TIMEOUT_SECONDS: ${ESSENTIA_MODELS_DOWNLOAD_TIMEOUT_SECONDS:-300}
  ESSENTIA_MODELS_VERIFY_HASH: ${ESSENTIA_MODELS_VERIFY_HASH:-true}
  ESSENTIA_MODELS_ACCEPT_LICENSE: ${ESSENTIA_MODELS_ACCEPT_LICENSE:-false}
  MODEL_REGISTRY_PATH: ${MODEL_REGISTRY_PATH:-/app/models/model_registry.json}
  MODEL_HASH_CHECK_ENABLED: ${MODEL_HASH_CHECK_ENABLED:-true}
  RECCOBEATS_BASE_URL: ${RECCOBEATS_BASE_URL:-https://api.reccobeats.com}
  RECCOBEATS_TIMEOUT_SECONDS: ${RECCOBEATS_TIMEOUT_SECONDS:-15}
  RECCOBEATS_MAX_RETRIES: ${RECCOBEATS_MAX_RETRIES:-3}
  RECCOBEATS_BATCH_DELAY_MS: ${RECCOBEATS_BATCH_DELAY_MS:-100}
  RECCOBEATS_HTTP_BATCH_SIZE: ${RECCOBEATS_HTTP_BATCH_SIZE:-40}
  RECCOBEATS_DB_UPSERT_BATCH_SIZE: ${RECCOBEATS_DB_UPSERT_BATCH_SIZE:-50}
  RECCOBEATS_ENRICH_DEFAULT_LIMIT: ${RECCOBEATS_ENRICH_DEFAULT_LIMIT:-5000}
  RECCOBEATS_ENRICH_MAX_LIMIT: ${RECCOBEATS_ENRICH_MAX_LIMIT:-10000}

services:
  core-api:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
    ports:
      - "127.0.0.1:8765:8765"
    env_file:
      - .env
    environment:
      <<: *app-env
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      SPOTIFY_SCOPES: ${SPOTIFY_SCOPES}
      SPOTIFY_AUTH_STORAGE: ${SPOTIFY_AUTH_STORAGE}
    volumes:
      - spotify_curator_data:/app/data
      - spotify_curator_cache:/app/cache
      - ./models:/app/models
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./profiles:/app/profiles:ro
    mem_limit: 768m
    cpus: 1.0
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8765"
      - --log-level
      - info
      - --access-log

  audio-downloader:
    profiles: ["audio"]
    build:
      context: .
      dockerfile: docker/audio-downloader/Dockerfile
    env_file:
      - .env
    environment:
      <<: *app-env
      AUDIO_USE_TEST_PROVIDER: ${AUDIO_USE_TEST_PROVIDER:-}
    volumes:
      - spotify_curator_data:/app/data
      - spotify_curator_cache:/app/cache
      - ./profiles:/app/profiles:ro
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  preview-resolver-worker:
    profiles: ["audio"]
    build:
      context: .
      dockerfile: docker/preview-resolver/Dockerfile
    env_file:
      - .env
    environment:
      <<: *app-env
    volumes:
      - spotify_curator_data:/app/data
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

  essentia-lowlevel-worker:
    profiles: ["audio"]
    build:
      context: .
      dockerfile: docker/essentia-lowlevel-worker/Dockerfile
    env_file:
      - .env
    environment:
      <<: *app-env
      ESSENTIA_USE_FIXTURE_JSON: ${ESSENTIA_USE_FIXTURE_JSON:-}
    volumes:
      - spotify_curator_data:/app/data
      - spotify_curator_cache:/app/cache
      - ./profiles:/app/profiles:ro
    mem_limit: 1024m
    cpus: 2.0
    restart: unless-stopped

  essentia-tensorflow-worker:
    profiles: ["advanced-analysis"]
    build:
      context: .
      dockerfile: docker/essentia-tensorflow-worker/Dockerfile
      target: cpu
    env_file:
      - .env
    environment:
      <<: *app-env
    volumes:
      - spotify_curator_data:/app/data
      - spotify_curator_cache:/app/cache
      - ./models:/app/models:ro
      - ./profiles:/app/profiles:ro
    mem_limit: ${DOCKER_TF_MEM_LIMIT:-3584m}
    memswap_limit: ${DOCKER_TF_MEM_LIMIT:-3584m}
    cpus: 4.0
    restart: unless-stopped

volumes:
  spotify_curator_data:
    name: spotify_curator_data
    external: false
  spotify_curator_cache:
    name: spotify_curator_cache
    external: false
