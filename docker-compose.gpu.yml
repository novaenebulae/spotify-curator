# GPU overlay for essentia-tensorflow-worker (Lambda Labs / NVIDIA Container Toolkit).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml \
#     --profile advanced-analysis up -d

services:
  essentia-tensorflow-worker:
    build:
      target: gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      ESSENTIA_TF_DEVICE: gpu
      TF_FORCE_GPU_ALLOW_GROWTH: "true"
    mem_limit: null
    memswap_limit: null
