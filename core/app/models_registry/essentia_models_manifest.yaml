# Essentia TensorFlow models manifest (phase 6).
# Generated from official Essentia model URLs:
#   https://essentia.upf.edu/models.html
#   https://essentia.upf.edu/models/
# Only .pb (weights) + .json (metadata) files are used. No ONNX / TFJS / savedmodel.
# Heavy model files are NEVER committed; only this manifest is versioned.

license:
  name: "CC BY-NC-SA 4.0"
  source_url: "https://essentia.upf.edu/models.html"
  requires_explicit_acceptance: true

default_profile: phase6-recommended

profiles:
  phase6-minimal:
    description: "Discogs EffNet + primary classifiers, without heavy MAEST genre model."
    models:
      - discogs_effnet_bs64
      - mood_aggressive_discogs_effnet
      - mood_happy_discogs_effnet
      - mood_party_discogs_effnet
      - mood_relaxed_discogs_effnet
      - mood_sad_discogs_effnet
      - mood_acoustic_discogs_effnet
      - mood_electronic_discogs_effnet
      - voice_instrumental_discogs_effnet
      - danceability_discogs_effnet
      - approachability_regression_discogs_effnet
      - engagement_regression_discogs_effnet

  phase6-recommended:
    description: "Full phase 6 recommended profile, adds MAEST + Genre Discogs519."
    extends: phase6-minimal
    models:
      - discogs_maest_30s_pw_519l
      - genre_discogs519_maest_519l

  phase6-full:
    description: "Adds MusicNN + DEAM/MuSe for optional arousal/valence fallback."
    extends: phase6-recommended
    models:
      - msd_musicnn
      - deam_msd_musicnn_2
      - muse_msd_musicnn_2

